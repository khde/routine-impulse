quarkus.application.name=Routine Impulse
quarkus.log.level=INFO

quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=
quarkus.datasource.password=
quarkus.datasource.jdbc.url=

quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true

quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.issuer=routineimpulse
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.verify.key.location=publicKey.pem

quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated

quarkus.http.auth.permission.auth.paths=/api/auth/*
quarkus.http.auth.permission.auth.policy=permit
